<svg xmlns="http://www.w3.org/2000/svg" width="940" height="430" viewBox="0 0 940 430" font-family="Caveat, 'Comic Sans MS', cursive">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&amp;display=swap');
      text { font-family: 'Caveat', 'Comic Sans MS', cursive; }
    </style>
    <filter id="wobble" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.013" numOctaves="2" seed="7" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="3.6"/>
    </filter>
    <marker id="arrow" viewBox="0 0 12 12" refX="9" refY="6" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M1 1 L10 6 L1 11" fill="none" stroke="#3b4252" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="940" height="430" fill="#fdfdfb"/>
  <text x="470" y="48" text-anchor="middle" font-size="34" font-weight="700" fill="#2e3440">Deno 2.9 Desktop Calculator</text>

  <g filter="url(#wobble)">
    <rect x="40" y="110" width="240" height="120" rx="14" fill="#dbeafe" stroke="#3b4252" stroke-width="2.4"/>
    <rect x="350" y="110" width="240" height="120" rx="14" fill="#dcfce7" stroke="#3b4252" stroke-width="2.4"/>
    <rect x="660" y="110" width="240" height="120" rx="14" fill="#ede9fe" stroke="#3b4252" stroke-width="2.4"/>
    <rect x="350" y="300" width="240" height="96" rx="14" fill="#fef9c3" stroke="#3b4252" stroke-width="2.4"/>

    <line x1="280" y1="170" x2="350" y2="170" stroke="#3b4252" stroke-width="2.4" marker-end="url(#arrow)"/>
    <line x1="590" y1="170" x2="660" y2="170" stroke="#3b4252" stroke-width="2.4" marker-end="url(#arrow)"/>
    <line x1="470" y1="230" x2="470" y2="300" stroke="#3b4252" stroke-width="2.4" marker-end="url(#arrow)"/>
  </g>

  <text x="160" y="158" text-anchor="middle" font-size="26" font-weight="700" fill="#1e3a8a">deno desktop</text>
  <text x="160" y="188" text-anchor="middle" font-size="22" fill="#2e3440">main.ts</text>
  <text x="160" y="214" text-anchor="middle" font-size="18" fill="#4c566a">the entrypoint</text>

  <text x="470" y="156" text-anchor="middle" font-size="26" font-weight="700" fill="#166534">Deno runtime</text>
  <text x="470" y="186" text-anchor="middle" font-size="22" fill="#2e3440">Deno.serve()</text>
  <text x="470" y="212" text-anchor="middle" font-size="18" fill="#4c566a">serves the UI</text>

  <text x="780" y="156" text-anchor="middle" font-size="26" font-weight="700" fill="#5b21b6">Native window</text>
  <text x="780" y="186" text-anchor="middle" font-size="22" fill="#2e3440">webview</text>
  <text x="780" y="212" text-anchor="middle" font-size="18" fill="#4c566a">renders HTML + JS</text>

  <text x="470" y="342" text-anchor="middle" font-size="24" font-weight="700" fill="#854d0e">single binary</text>
  <text x="470" y="372" text-anchor="middle" font-size="19" fill="#4c566a">.app / .dmg / .exe / .deb</text>

  <text x="305" y="150" text-anchor="middle" font-size="17" fill="#4c566a">build</text>
  <text x="615" y="150" text-anchor="middle" font-size="17" fill="#4c566a">open</text>
  <text x="512" y="272" text-anchor="middle" font-size="17" fill="#4c566a">compile</text>
</svg>
