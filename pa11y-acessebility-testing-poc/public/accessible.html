<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Accessible Signup</title>
    <style>
      body { font-family: system-ui, sans-serif; margin: 2rem; color: #1a1a1a; background: #ffffff; }
      label { display: block; margin: 0.75rem 0 0.25rem; }
      input { padding: 0.4rem; }
      button { margin-top: 1rem; padding: 0.5rem 1rem; background: #0b5394; color: #ffffff; border: 0; }
    </style>
  </head>
  <body>
    <header>
      <h1>Newsletter signup</h1>
    </header>
    <main>
      <p>Join the list to get product updates.</p>
      <img src="logo.png" alt="Acme company logo" width="120" height="40" />
      <form action="/subscribe" method="post">
        <label for="email">Email address</label>
        <input id="email" name="email" type="email" autocomplete="email" required />
        <button type="submit">Subscribe</button>
      </form>
      <p><a href="/privacy">Read our privacy policy</a></p>
    </main>
  </body>
</html>
